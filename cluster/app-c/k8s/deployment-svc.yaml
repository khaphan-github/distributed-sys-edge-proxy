apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-c-deployment
  labels:
    app: app-c

spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-c
  template:
    metadata:
      labels:
        app: app-c
    spec:
      containers:
        - name: app-c
          image: edge_proxy_app-c:latest
          ports:
            - containerPort: 5200
              name: flask-port
          imagePullPolicy: Never
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
---
apiVersion: v1
kind: Service
metadata:
  name: app-c-service
spec:
  type: ClusterIP
  selector:
    app: app-c
  ports:
    - name: app-c-svc-port
      protocol: TCP
      port: 4200
      targetPort: flask-port
