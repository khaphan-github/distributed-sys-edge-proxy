# ConfigMap for Envoy Proxy Configuration
# Best Practice: Separate ConfigMap files for easier management and reusability
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: default
  labels:
    app: envoyrproxy
    component: config
  annotations:
    description: "Envoy proxy configuration files for App-B"
    version: "1.0"
data:
  # Envoy configuration file
  envoy.yaml: |
    static_resources:
      listeners:
        - name: app_b_sidecar_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 9202

          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: app_b_sidecar_hcm_filter
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog

                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                    route_config:
                      name: app_b_sidecar_http_route_config
                      virtual_hosts:
                        - name: app_b_sidecar_virtual_host
                          domains:
                            - "*"
                          routes:
                            - name:
                              match:
                                prefix: "/"
                              route:
                                cluster: app_b_service

      clusters:
        - name: app_b_service
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: app_b_service
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: 9002
